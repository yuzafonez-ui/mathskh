<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReanEnglish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-2:#24365c;
    --paper:#FAF6EE;
    --paper-2:#F1EADA;
    --saffron:#E8A33D;
    --saffron-dark:#C9822A;
    --green:#2F6B4F;
    --green-bg:#E4EFE7;
    --red:#C0503A;
    --red-bg:#F6E4DF;
    --slate:#5B6472;
    --border:rgba(27,42,74,0.13);
    --radius:16px;
    --tg-bg: var(--paper);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--navy);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overscroll-behavior-y:none;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:24px;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 10px 20px;
  }
  .brand{
    display:flex;align-items:baseline;gap:8px;
    font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:-0.02em;
  }
  .brand .dot{color:var(--saffron-dark);}
  .iconbtn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
    background:var(--paper-2); display:flex;align-items:center;justify-content:center;
    font-size:16px;cursor:pointer;color:var(--navy);
  }
  .iconbtn:active{transform:scale(0.94);}

  .screen{padding:6px 20px 20px 20px; flex:1; display:flex; flex-direction:column; gap:16px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--saffron-dark); font-weight:600;
  }
  h1.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin:2px 0 4px 0;letter-spacing:-0.01em;}
  p.lede{color:var(--slate);font-size:14.5px;line-height:1.5;margin:0;}

  .card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px; position:relative; cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:active{transform:scale(0.985);}
  .card.static{cursor:default;}
  .card-row{display:flex;align-items:center;gap:14px;}
  .card-icon{
    width:44px;height:44px;border-radius:12px;background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  }
  .card-title{font-weight:600;font-size:15.5px;margin:0;}
  .card-sub{color:var(--slate);font-size:12.5px;margin:3px 0 0 0;}
  .card-arrow{margin-left:auto;color:var(--slate);font-size:18px;}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    border:none;border-radius:12px;padding:14px 18px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;width:100%;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--navy);color:var(--paper);}
  .btn-accent{background:var(--saffron);color:var(--navy);}
  .btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--border);}
  .btn-danger{background:var(--red-bg);color:var(--red);}
  .btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:10px;}

  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--slate);}
  .field input, .field textarea, .field select{
    border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14.5px;
    font-family:'Inter',sans-serif;background:#fff;color:var(--navy);width:100%;
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field input:focus, .field textarea:focus, .field select:focus{outline:2px solid var(--saffron);outline-offset:1px;}

  .error-msg{background:var(--red-bg);color:var(--red);padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;}
  .ok-msg{background:var(--green-bg);color:var(--green);padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;}

  .progress-wrap{display:flex;align-items:center;gap:10px;}
  .progress-track{flex:1;height:6px;border-radius:4px;background:var(--paper-2);overflow:hidden;}
  .progress-fill{height:100%;background:var(--saffron);border-radius:4px;transition:width .25s ease;}
  .progress-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate);white-space:nowrap;}

  .option{
    border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:14.5px;
    display:flex;align-items:center;gap:12px;cursor:pointer;background:#fff;font-weight:500;
  }
  .option .letter{
    width:26px;height:26px;border-radius:50%;background:var(--paper-2);color:var(--navy);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
    font-family:'IBM Plex Mono',monospace;
  }
  .option.selected{border-color:var(--saffron);background:#FFF7EA;}
  .option.selected .letter{background:var(--saffron);color:var(--navy);}
  .option.correct{border-color:var(--green);background:var(--green-bg);}
  .option.correct .letter{background:var(--green);color:#fff;}
  .option.wrong{border-color:var(--red);background:var(--red-bg);}
  .option.wrong .letter{background:var(--red);color:#fff;}

  .score-ring{
    width:140px;height:140px;border-radius:50%;margin:8px auto 4px auto;position:relative;
    display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--saffron) calc(var(--pct) * 1%), var(--paper-2) 0);
  }
  .score-ring::before{content:'';position:absolute;inset:10px;border-radius:50%;background:#fff;}
  .score-ring .val{position:relative;font-family:'Fraunces',serif;font-size:28px;font-weight:700;}

  .footer-nav{
    position:sticky;bottom:0;background:linear-gradient(180deg, rgba(250,246,238,0) 0%, var(--paper) 30%);
    padding:14px 20px 4px 20px;
  }

  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:2px;}
  .tab{
    padding:9px 12px;font-size:13px;font-weight:600;color:var(--slate);cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--navy);border-bottom-color:var(--saffron);}

  .list-item{
    display:flex;align-items:center;justify-content:between;gap:10px;
    border:1px solid var(--border);border-radius:12px;padding:11px 13px;background:#fff;
  }
  .list-item .txt{flex:1;font-size:13.5px;}
  .list-item .txt b{display:block;font-size:14px;margin-bottom:2px;}
  .list-item .actions{display:flex;gap:6px;}
  .mini-btn{
    width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;
  }

  .divider{height:1px;background:var(--border);margin:4px 0;}
  .empty-state{
    text-align:center;padding:30px 12px;color:var(--slate);font-size:13.5px;
  }
  .badge{
    display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    padding:3px 8px;border-radius:20px;background:var(--paper-2);color:var(--navy);
  }
  .kicker-row{display:flex;align-items:center;justify-content:space-between;}

  ::-webkit-scrollbar{width:0px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   ReanEnglish — Telegram Mini App (frontend-only, no backend)
   All content lives in localStorage on the device running it.
   ============================================================ */

const STORAGE_KEY = 'reanenglish_data_v1';
const HISTORY_KEY = 'reanenglish_history_v1';
const SESSION_ADMIN_KEY = 'reanenglish_admin_session';

const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { try { tg.ready(); tg.expand(); tg.setHeaderColor && tg.setHeaderColor('#1B2A4A'); } catch(e){} }

function currentUserId(){
  try {
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) return String(tg.initDataUnsafe.user.id);
  } catch(e){}
  return 'guest';
}
function currentUserName(){
  try {
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
      const u = tg.initDataUnsafe.user;
      return u.first_name ? (u.first_name + (u.last_name ? ' '+u.last_name : '')) : 'Student';
    }
  } catch(e){}
  return 'Guest';
}

/* ---------------- default seed data ---------------- */
function defaultData(){
  return {
    settings: { adminUser: 'admin', adminPass: 'Rean#2026' },
    categories: [
      {
        id:'cat_grammar', name:'Grammar', icon:'📘',
        tests:[
          { id:'t_tenses', title:'Tenses Basics', desc:'Present, past & future simple', questions:[
            {id:'q1', text:'She ___ to school every day.', options:['go','goes','going','gone'], correct:1},
            {id:'q2', text:'They ___ football yesterday.', options:['play','plays','played','playing'], correct:2},
            {id:'q3', text:'I ___ finish my homework by tomorrow.', options:['will','am','was','did'], correct:0},
            {id:'q4', text:'He ___ watching TV right now.', options:['is','are','was','be'], correct:0},
            {id:'q5', text:'We ___ never been to Japan.', options:['has','have','had','having'], correct:1}
          ]},
          { id:'t_prepositions', title:'Prepositions', desc:'In, on, at and more', questions:[
            {id:'q1', text:'The book is ___ the table.', options:['on','in','at','by'], correct:0},
            {id:'q2', text:'She was born ___ 2005.', options:['on','at','in','for'], correct:2},
            {id:'q3', text:'We will meet ___ Monday.', options:['in','on','at','since'], correct:1},
            {id:'q4', text:'He is afraid ___ spiders.', options:['of','with','for','about'], correct:0}
          ]}
        ]
      },
      {
        id:'cat_vocab', name:'Vocabulary', icon:'📗',
        tests:[
          { id:'t_daily', title:'Daily Life Words', desc:'Common everyday vocabulary', questions:[
            {id:'q1', text:'Something you use to write is a ___.', options:['pen','plate','shoe','cloud'], correct:0},
            {id:'q2', text:'The opposite of "cheap" is ___.', options:['fast','expensive','small','quiet'], correct:1},
            {id:'q3', text:'A place where you buy food is a ___.', options:['library','market','hospital','airport'], correct:1},
            {id:'q4', text:'"Enormous" means ___.', options:['tiny','very big','very fast','beautiful'], correct:1},
            {id:'q5', text:'The opposite of "begin" is ___.', options:['start','finish','open','continue'], correct:1}
          ]}
        ]
      },
      {
        id:'cat_reading', name:'Reading', icon:'📙',
        tests:[
          { id:'t_short', title:'Short Passage Quiz', desc:'Read and answer', questions:[
            {id:'q1', text:'"Tom woke up late and missed the bus." Why was Tom late?', options:['He missed the bus','He woke up late','He was sick','He lost his bag'], correct:1},
            {id:'q2', text:'"Maria loves reading books about the ocean." What does Maria love?', options:['Cooking','Swimming','Reading about the ocean','Playing music'], correct:2},
            {id:'q3', text:'"It rained all day, so the children stayed inside." What did the children do?', options:['Played outside','Stayed inside','Went to school','Went swimming'], correct:1}
          ]}
        ]
      }
    ]
  };
}

function loadData(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { const d = defaultData(); localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); return d; }
    return JSON.parse(raw);
  } catch(e){ const d = defaultData(); localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); return d; }
}
function saveData(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function loadHistory(){
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); } catch(e){ return {}; }
}
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
function addHistoryEntry(entry){
  const h = loadHistory();
  const uid = currentUserId();
  if (!h[uid]) h[uid] = [];
  h[uid].unshift(entry);
  h[uid] = h[uid].slice(0, 30);
  saveHistory(h);
}

let DATA = loadData();

/* ---------------- tiny router / state ---------------- */
let state = {
  screen: 'home',
  categoryId: null,
  testId: null,
  quiz: null,      // { qIndex, answers: [], test, category }
  adminTab: 'categories',
  adminEditing: null // {type:'category'|'test'|'question', catId, testId, qId}
};

function nav(screen, extra){
  state.screen = screen;
  Object.assign(state, extra || {});
  render();
  window.scrollTo(0,0);
}

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ==================== RENDER ROOT ==================== */
function render(){
  const app = document.getElementById('app');
  let html = '';
  if (state.screen === 'home') html = screenHome();
  else if (state.screen === 'categories') html = screenCategories();
  else if (state.screen === 'tests') html = screenTests();
  else if (state.screen === 'testIntro') html = screenTestIntro();
  else if (state.screen === 'quiz') html = screenQuiz();
  else if (state.screen === 'results') html = screenResults();
  else if (state.screen === 'history') html = screenHistory();
  else if (state.screen === 'adminLogin') html = screenAdminLogin();
  else if (state.screen === 'adminDashboard') html = screenAdminDashboard();
  else html = screenHome();

  app.innerHTML = html;
  bindHandlers();
  updateTelegramBackButton();
}

function updateTelegramBackButton(){
  if (!tg || !tg.BackButton) return;
  if (state.screen === 'home') { tg.BackButton.hide(); }
  else {
    tg.BackButton.show();
    tg.BackButton.offClick && tg.BackButton.offClick(handleBack);
    tg.BackButton.onClick(handleBack);
  }
}
function handleBack(){
  const s = state.screen;
  if (s === 'categories' || s === 'history') nav('home');
  else if (s === 'tests') nav('categories');
  else if (s === 'testIntro') nav('tests', {categoryId: state.categoryId});
  else if (s === 'quiz') { if (confirm('Leave the test? Your progress will be lost.')) nav('testIntro'); }
  else if (s === 'results') nav('home');
  else if (s === 'adminLogin') nav('home');
  else if (s === 'adminDashboard') nav('home');
  else nav('home');
}

/* ==================== SCREENS ==================== */

function screenHome(){
  const totalTests = DATA.categories.reduce((a,c)=>a+c.tests.length,0);
  return `
    <div class="topbar">
      <div class="brand">Rean<span class="dot">English</span></div>
      <div class="iconbtn" data-action="go-admin" title="Admin">⚙️</div>
    </div>
    <div class="screen">
      <div class="eyebrow">Welcome, ${esc(currentUserName())}</div>
      <h1 class="page-title">Practice English,<br/>one quiz at a time.</h1>
      <p class="lede">${DATA.categories.length} categories · ${totalTests} tests ready for you. Pick a topic and test what you know.</p>

      <div class="card" data-action="go-categories">
        <div class="card-row">
          <div class="card-icon">📝</div>
          <div>
            <p class="card-title">Start a test</p>
            <p class="card-sub">Choose a category and begin</p>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </div>

      <div class="card" data-action="go-history">
        <div class="card-row">
          <div class="card-icon">📊</div>
          <div>
            <p class="card-title">My results</p>
            <p class="card-sub">See your past scores</p>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </div>
    </div>
  `;
}

function screenCategories(){
  const rows = DATA.categories.map(c => `
    <div class="card" data-action="open-cat" data-id="${c.id}">
      <div class="card-row">
        <div class="card-icon">${c.icon || '📘'}</div>
        <div>
          <p class="card-title">${esc(c.name)}</p>
          <p class="card-sub">${c.tests.length} test${c.tests.length===1?'':'s'}</p>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </div>
  `).join('');
  return `
    <div class="topbar">
      <div class="iconbtn" data-action="go-home">←</div>
      <div class="brand" style="font-size:17px;">Categories</div>
      <div style="width:36px;"></div>
    </div>
    <div class="screen">
      ${rows || `<div class="empty-state">No categories yet. Ask your admin to add some.</div>`}
    </div>
  `;
}

function screenTests(){
  const cat = DATA.categories.find(c => c.id === state.categoryId);
  if (!cat) return screenCategories();
  const rows = cat.tests.map(t => `
    <div class="card" data-action="open-test" data-id="${t.id}">
      <div class="card-row">
        <div class="card-icon">📄</div>
        <div>
          <p class="card-title">${esc(t.title)}</p>
          <p class="card-sub">${esc(t.desc || '')} · ${t.questions.length} questions</p>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </div>
  `).join('');
  return `
    <div class="topbar">
      <div class="iconbtn" data-action="go-categories">←</div>
      <div class="brand" style="font-size:17px;">${esc(cat.name)}</div>
      <div style="width:36px;"></div>
    </div>
    <div class="screen">
      ${rows || `<div class="empty-state">No tests in this category yet.</div>`}
    </div>
  `;
}

function screenTestIntro(){
  const cat = DATA.categories.find(c => c.id === state.categoryId);
  const test = cat && cat.tests.find(t => t.id === state.testId);
  if (!test) return screenCategories();
  return `
    <div class="topbar">
      <div class="iconbtn" data-action="go-tests">←</div>
      <div class="brand" style="font-size:17px;">${esc(test.title)}</div>
      <div style="width:36px;"></div>
    </div>
    <div class="screen">
      <div class="card static">
        <div class="eyebrow">${esc(cat.name)}</div>
        <h1 class="page-title" style="font-size:21px;">${esc(test.title)}</h1>
        <p class="lede">${esc(test.desc || '')}</p>
        <div class="divider" style="margin:14px 0;"></div>
        <p class="lede"><b style="color:var(--navy);">${test.questions.length}</b> multiple-choice questions · no time limit</p>
      </div>
      <button class="btn btn-accent" data-action="start-quiz">Start test</button>
    </div>
  `;
}

function screenQuiz(){
  const q = state.quiz;
  const question = q.test.questions[q.qIndex];
  const total = q.test.questions.length;
  const pct = Math.round(((q.qIndex) / total) * 100);
  const selected = q.answers[q.qIndex];
  const letters = ['A','B','C','D','E','F'];
  const options = question.options.map((opt, i) => `
    <div class="option ${selected===i?'selected':''}" data-action="select-opt" data-idx="${i}">
      <div class="letter">${letters[i]}</div>
      <div>${esc(opt)}</div>
    </div>
  `).join('');
  return `
    <div class="topbar">
      <div class="iconbtn" data-action="quiz-back">←</div>
      <div class="brand" style="font-size:15px;">${esc(q.test.title)}</div>
      <div style="width:36px;"></div>
    </div>
    <div class="screen">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
        <div class="progress-label">${q.qIndex+1} / ${total}</div>
      </div>
      <h1 class="page-title" style="font-size:19px;line-height:1.35;">${esc(question.text)}</h1>
      <div style="display:flex;flex-direction:column;gap:10px;">${options}</div>
    </div>
    <div class="footer-nav">
      <button class="btn btn-primary" data-action="quiz-next" ${selected==null?'disabled style="opacity:.4;"':''}>
        ${q.qIndex === total-1 ? 'Finish test' : 'Next question'}
      </but
